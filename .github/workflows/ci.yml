name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests (sudan_plate)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        # The interpreter (sudan_plate.py) is pure Python with no heavy
        # dependencies, so the unit tests need only pytest. The OCR/detector
        # stack (fast-alpr, onnxruntime) isn't required to test the plate logic.
        run: pip install pytest

      - name: Run tests
        run: python -m pytest test_sudan_plate.py -v
